services:
  backend:
    build:
      context: ./apps/backend
    ports:
      - "3000:3000"
    env_file:
      - ./apps/backend/.env

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "5173:5173"
    env_file:
      - ./apps/frontend/.env
    depends_on:
      - backend

  mcp-server:
    build:
      context: ./apps/mcp-server
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace
    env_file:
      - ./apps/mcp-server/.env
    depends_on:
      - frontend

  agent:
    build:
      context: ./apps/agent
    ports:
      - "3001:3001"
    env_file:
      - ./apps/agent/.env
    volumes:
      - .:/workspace
    depends_on:
      - mcp-server
    restart: unless-stopped

  orchestration-api:
    build:
      context: ./apps/orchestration-api
    ports:
      - "7000:7000"
    env_file:
      - ./apps/orchestration-api/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    depends_on:
      - backend
      - frontend
      - mcp-server
      - agent
    restart: unless-stopped